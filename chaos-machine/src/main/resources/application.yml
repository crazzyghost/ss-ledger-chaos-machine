spring:
  application:
    name: ledger-chaos-machine
  threads:
    virtual:
      enabled: true
  config:
    import: optional:classpath:chaos-bootstrap.yml
  datasource:
    url: jdbc:sqlite:${chaos.datasource.path:./data/chaos.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-init-sql: PRAGMA journal_mode=WAL; PRAGMA busy_timeout=5000;
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    producer:
      acks: all
      enable-idempotence: true
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        delivery.timeout.ms: 120000
        spring.json.add.type.headers: false
#  security:
#    user:
#      name: admin
#      password: admin

server:
  port: ${SERVER_PORT:27100}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

chaos:
  datasource:
    path: ${CHAOS_DATASOURCE_PATH:./data/chaos.db}
  default-tenant-id: ${CHAOS_DEFAULT_TENANT_ID:org_system}
  kafka:
    cluster-label: ${CHAOS_TARGET_LABEL:local}
  history:
    queue-capacity: ${CHAOS_HISTORY_QUEUE_CAPACITY:10000}
    retention-days: ${CHAOS_HISTORY_RETENTION_DAYS:30}
  batch:
    max-rows: ${CHAOS_BATCH_MAX_ROWS:50000}
    queue-capacity: ${CHAOS_BATCH_QUEUE_CAPACITY:1000}
    workers: ${CHAOS_BATCH_WORKERS:20}
    default-max-rate: ${CHAOS_BATCH_DEFAULT_MAX_RATE:100}
  limits:
    max-duplicates: ${CHAOS_LIMITS_MAX_DUPLICATES:10}
    max-burst: ${CHAOS_LIMITS_MAX_BURST:100}
    max-rate-per-second: ${CHAOS_LIMITS_MAX_RATE_PER_SECOND:1000}
    max-delay-ms: ${CHAOS_LIMITS_MAX_DELAY_MS:30000}
  topics:
    organization-onboarded: organization.onboarded
    organization-va-updated: organization.va.updated
    organization-topup-confirmed: organization.topup.confirmed
    organization-transfer-requested: organization.transfer.requested
    organization-treasury-prefund-completed: organization.treasury.prefund.completed
    organization-treasury-sweep-completed: organization.treasury.sweep.completed
    organization-treasury-transfer-completed: organization.treasury.transfer.completed
    organization-va-settlement-initiated: organization.va.settlement.initiated
    organization-va-settlement-completed: organization.va.settlement.completed
    organization-va-settlement-failed: organization.va.settlement.failed
    collection-completed: collection.completed
    disbursement-completed: disbursement.completed
  bootstrap:
    reconcile-delay-ms: ${CHAOS_BOOTSTRAP_RECONCILE_DELAY_MS:60000}
    reconcile-initial-delay-ms: ${CHAOS_BOOTSTRAP_RECONCILE_INITIAL_DELAY_MS:30000}

auth-service:
  base-url: ${AUTH_SERVICE_BASE_URL:}
  login-uri: ${AUTH_SERVICE_LOGIN_URI:}
  token-verification-uri: ${AUTH_SERVICE_TOKEN_VERIFICATION_URI:}
  client-auth:
    enabled: ${AUTH_CLIENT_AUTH_ENABLED:false}

ledger:
  base-url: ${LEDGER_BASE_URL:http://localhost:27000}
  accounts-path: ${LEDGER_ACCOUNTS_PATH:/api/v0/accounts}
  timeouts:
    connect-ms: ${LEDGER_CONNECT_TIMEOUT_MS:5000}
    read-ms: ${LEDGER_READ_TIMEOUT_MS:30000}
  retry:
    max-attempts: ${LEDGER_RETRY_MAX_ATTEMPTS:3}
    initial-delay-ms: ${LEDGER_RETRY_INITIAL_DELAY_MS:1000}
  auth-token: ${CLIENT_TOKEN}
