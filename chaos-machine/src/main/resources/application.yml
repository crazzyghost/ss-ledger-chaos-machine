spring:
  application:
    name: ledger-chaos-machine
  threads:
    virtual:
      enabled: true
  config:
    import: optional:classpath:chaos-bootstrap.yml
  datasource:
    url: jdbc:sqlite:${chaos.datasource.path:./data/chaos.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-init-sql: PRAGMA journal_mode=WAL; PRAGMA busy_timeout=5000;
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    producer:
      acks: all
      enable-idempotence: true
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        delivery.timeout.ms: 120000
        spring.json.add.type.headers: false
  security:
    user:
      name: admin
      password: admin

server:
  port: ${SERVER_PORT:27100}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

chaos:
  datasource:
    path: ${CHAOS_DATASOURCE_PATH:./data/chaos.db}
  default-tenant-id: ${CHAOS_DEFAULT_TENANT_ID:org_system}
  kafka:
    cluster-label: ${CHAOS_TARGET_LABEL:local}
    consumer:
      enabled: ${CHAOS_KAFKA_CONSUMER_ENABLED:true}
      group-id: ${KAFKA_CONSUMER_GROUP:chaos-machine}
      dlq-group-id: ${CHAOS_KAFKA_DLQ_CONSUMER_GROUP:chaos-machine-dlq}
      concurrency: ${CHAOS_KAFKA_CONSUMER_CONCURRENCY:1}
      auto-offset-reset: ${CHAOS_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
      max-attempts: ${CHAOS_KAFKA_CONSUMER_MAX_ATTEMPTS:3}
      backoff-initial-ms: ${CHAOS_KAFKA_CONSUMER_BACKOFF_INITIAL_MS:1000}
      backoff-multiplier: ${CHAOS_KAFKA_CONSUMER_BACKOFF_MULTIPLIER:2.0}
  history:
    queue-capacity: ${CHAOS_HISTORY_QUEUE_CAPACITY:10000}
    retention-days: ${CHAOS_HISTORY_RETENTION_DAYS:30}
  batch:
    max-rows: ${CHAOS_BATCH_MAX_ROWS:50000}
    queue-capacity: ${CHAOS_BATCH_QUEUE_CAPACITY:1000}
    workers: ${CHAOS_BATCH_WORKERS:20}
    default-max-rate: ${CHAOS_BATCH_DEFAULT_MAX_RATE:100}
  limits:
    max-duplicates: ${CHAOS_LIMITS_MAX_DUPLICATES:10}
    max-burst: ${CHAOS_LIMITS_MAX_BURST:100}
    max-rate-per-second: ${CHAOS_LIMITS_MAX_RATE_PER_SECOND:1000}
    max-delay-ms: ${CHAOS_LIMITS_MAX_DELAY_MS:30000}
    max-n-times: ${CHAOS_LIMITS_MAX_N_TIMES:50000}
    max-n-times-sync: ${CHAOS_LIMITS_MAX_N_TIMES_SYNC:50000}
    max-sync-duration-ms: ${CHAOS_LIMITS_MAX_SYNC_DURATION_MS:60000}
  ledger:
    reservation:
      # Page size requested when listing an account's reservations (newest first), then filtered
      # in-process by transactionRef (the ledger does not filter server-side yet — ADR-018).
      page-size: ${CHAOS_LEDGER_RESERVATION_PAGE_SIZE:100}
      poll:
        interval-ms: ${CHAOS_LEDGER_RESERVATION_POLL_INTERVAL_MS:500}
        timeout-ms: ${CHAOS_LEDGER_RESERVATION_POLL_TIMEOUT_MS:5000}
  statements:
    artifact:
      # The chaos backend's own hop to the ledger's object store (ADR-034). It fetches the
      # statement server-side and streams it, so the presigned S3 URL never reaches the browser.
      # A multi-MB transfer needs a far longer read budget than the ledger's JSON reads.
      connect-ms: ${CHAOS_STATEMENT_ARTIFACT_CONNECT_MS:5000}
      read-ms: ${CHAOS_STATEMENT_ARTIFACT_READ_MS:60000}
    # The largest artifact the gateway will relay; a larger one is refused (502), never buffered.
    max-artifact-bytes: ${CHAOS_STATEMENT_MAX_ARTIFACT_BYTES:104857600} # 100 MiB
  topics:
    organization-onboarded: organization.onboarded
    organization-va-updated: organization.va.updated
    organization-topup-confirmed: organization.topup.confirmed
    organization-transfer-requested: organization.transfer.requested
    organization-treasury-prefund-completed: organization.treasury.prefund.completed
    organization-treasury-sweep-completed: organization.treasury.sweep.completed
    organization-treasury-transfer-completed: organization.treasury.transfer.completed
    organization-va-settlement-initiated: organization.va.settlement.initiated
    organization-va-settlement-completed: organization.va.settlement.completed
    organization-va-settlement-failed: organization.va.settlement.failed
    collection-completed: collection.completed
    disbursement-initiated: disbursement.initiated
    disbursement-completed: disbursement.completed
    disbursement-failed: disbursement.failed
    ledger-account-created: ${CHAOS_LEDGER_ACCOUNT_CREATED_TOPIC:ledger.account.created}
    ledger-transaction-failed: ${CHAOS_LEDGER_TRANSACTION_FAILED_TOPIC:ledger.transaction.failed}
    ledger-balance-updated: ${CHAOS_LEDGER_BALANCE_UPDATED_TOPIC:ledger.balance.updated}
    ledger-reservation-created: ${CHAOS_LEDGER_RESERVATION_CREATED_TOPIC:ledger.reservation.created}
    ledger-reservation-released: ${CHAOS_LEDGER_RESERVATION_RELEASED_TOPIC:ledger.reservation.released}
    ledger-reconciliation-mismatch: ${CHAOS_LEDGER_RECONCILIATION_MISMATCH_TOPIC:ledger.reconciliation.mismatch}
  bootstrap:
    reconcile-delay-ms: ${CHAOS_BOOTSTRAP_RECONCILE_DELAY_MS:60000}
    reconcile-initial-delay-ms: ${CHAOS_BOOTSTRAP_RECONCILE_INITIAL_DELAY_MS:30000}
  organization:
    outbox:
      enabled: ${CHAOS_ORG_OUTBOX_ENABLED:true}
      poll-interval-ms: ${CHAOS_ORG_OUTBOX_POLL_INTERVAL_MS:1000}
      batch-size: ${CHAOS_ORG_OUTBOX_BATCH_SIZE:50}
      max-attempts: ${CHAOS_ORG_OUTBOX_MAX_ATTEMPTS:5}
  reference-data:
    seed-on-startup: ${CHAOS_REFERENCE_DATA_SEED_ON_STARTUP:IF_EMPTY}   # IF_EMPTY | ALWAYS | NEVER
    # Defaults to the keyless mledoze/countries GitHub dataset (the upstream source restcountries.com
    # is generated from). To use the official, key-gated v5 API instead, set:
    #   base-url: https://api.restcountries.com
    #   path: /countries/v5
    #   fields: name,cca2,cca3,currencies
    #   limit: 500
    #   api-key: <your restcountries.com Bearer key>
    restcountries:
      base-url: ${CHAOS_RESTCOUNTRIES_BASE_URL:https://raw.githubusercontent.com}
      path: ${CHAOS_RESTCOUNTRIES_PATH:/mledoze/countries/master/countries.json}
      fields: ${CHAOS_RESTCOUNTRIES_FIELDS:}
      limit: ${CHAOS_RESTCOUNTRIES_LIMIT:0}
      api-key: ${CHAOS_RESTCOUNTRIES_API_KEY:}
      connect-ms: ${CHAOS_RESTCOUNTRIES_CONNECT_MS:5000}
      read-ms: ${CHAOS_RESTCOUNTRIES_READ_MS:20000}
      retry-max-attempts: ${CHAOS_RESTCOUNTRIES_RETRY_MAX_ATTEMPTS:3}

auth-service:
  base-url: ${AUTH_SERVICE_BASE_URL:}
  login-uri: ${AUTH_SERVICE_LOGIN_URI:/realm/login}
  token-verification-uri: ${AUTH_SERVICE_TOKEN_VERIFICATION_URI:/realm/access-token/verify}
  realm-id: ${AUTH_SERVICE_REALM_ID:}
  verification-cache-ttl-seconds: ${AUTH_VERIFICATION_CACHE_TTL_SECONDS:30}
  client-auth:
    enabled: ${AUTH_CLIENT_AUTH_ENABLED:false}

ledger:
  base-url: ${LEDGER_BASE_URL:http://localhost:27000}
  accounts-path: ${LEDGER_ACCOUNTS_PATH:/api/v0/accounts}
  timeouts:
    connect-ms: ${LEDGER_CONNECT_TIMEOUT_MS:5000}
    read-ms: ${LEDGER_READ_TIMEOUT_MS:30000}
  retry:
    max-attempts: ${LEDGER_RETRY_MAX_ATTEMPTS:3}
    initial-delay-ms: ${LEDGER_RETRY_INITIAL_DELAY_MS:1000}
  auth-token: ${LEDGER_AUTH_TOKEN:}
  proxy:
    forward-token: ${LEDGER_PROXY_FORWARD_TOKEN:true}
    service-token: ${LEDGER_PROXY_SERVICE_TOKEN:}
    circuit-breaker:
      failure-threshold: ${LEDGER_CB_FAILURE_THRESHOLD:5}
      success-threshold: ${LEDGER_CB_SUCCESS_THRESHOLD:2}
      open-duration-ms: ${LEDGER_CB_OPEN_DURATION_MS:30000}
