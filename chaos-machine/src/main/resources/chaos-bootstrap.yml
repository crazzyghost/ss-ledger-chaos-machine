chaos:
  bootstrap:
    provision-on-startup: true
    system-accounts:
      - role: SETTLEMENT_ACCOUNT
        accountCode: ASSET.BANK.SETTLEMENT.0000000000001.GHS
        accountName: Bank Settlement Account
        accountCategory: ASSET
        currency: GHS
        ownershipType: SYSTEM
      - role: PLATFORM_FLOAT
        accountCode: ASSET.PLATFORM.FLOAT
        accountName: Platform Float
        accountCategory: ASSET
        currency: GHS
        ownershipType: SYSTEM
      - role: PLATFORM_FLOAT_MTN
        accountCode: ASSET.PLATFORM.FLOAT.MTN
        accountName: Platform Float - MTN
        accountCategory: ASSET
        currency: GHS
        ownershipType: SYSTEM
        parentRole: PLATFORM_FLOAT
      - role: PLATFORM_FLOAT_TELECEL
        accountCode: ASSET.PLATFORM.FLOAT.TELECEL
        accountName: Platform Float - Telecel
        accountCategory: ASSET
        currency: GHS
        ownershipType: SYSTEM
        parentRole: PLATFORM_FLOAT
      - role: PLATFORM_FEE
        accountCode: REVENUE.PLATFORM.FEE
        accountName: Platform Fee Revenue
        accountCategory: REVENUE
        currency: GHS
        ownershipType: SYSTEM
      - role: PROVIDER_FEE
        accountCode: REVENUE.PROVIDER.FEE
        accountName: Provider Fee Revenue
        accountCategory: REVENUE
        currency: GHS
        ownershipType: SYSTEM
    flow-slots:
      - flowType: COLLECTION_COMPLETED
        slotName: source
        accountRole: PLATFORM_FLOAT
      - flowType: COLLECTION_COMPLETED
        slotName: fee
        accountRole: PLATFORM_FEE
      # Collection destination is the operator-picked organization VA (no role; request-supplied).
      - flowType: COLLECTION_COMPLETED
        slotName: destination
      # Disbursement-completed: organization VA debited (no role; request-supplied), settlement
      # account credited.
      - flowType: DISBURSEMENT_COMPLETED
        slotName: source
      - flowType: DISBURSEMENT_COMPLETED
        slotName: destination
        accountRole: SETTLEMENT_ACCOUNT
      # Settlement-completed source is the operator-picked organization VA (no role; request-supplied).
      - flowType: SETTLEMENT_COMPLETED
        slotName: source
      - flowType: SETTLEMENT_COMPLETED
        slotName: destination
        accountRole: SETTLEMENT_ACCOUNT
      - flowType: TOPUP_CONFIRMED
        slotName: destination
        accountRole: PLATFORM_FLOAT
      # Organization-account source: no role — resolved only from the request's slotOverrides
      # (the Single Flow Run form supplies the operator-picked organization VA).
      - flowType: TOPUP_CONFIRMED
        slotName: source
      # Inter-VA transfer: both ends are organization accounts (no role; request-supplied).
      - flowType: TRANSFER_REQUESTED
        slotName: source
      - flowType: TRANSFER_REQUESTED
        slotName: destination
      # Treasury transfer (momo -> momo): both ends are system float accounts.
      - flowType: TREASURY_TRANSFER_COMPLETED
        slotName: source
        accountRole: PLATFORM_FLOAT_MTN
      - flowType: TREASURY_TRANSFER_COMPLETED
        slotName: destination
        accountRole: PLATFORM_FLOAT_TELECEL
      - flowType: TREASURY_PREFUND_COMPLETED
        slotName: source
        accountRole: SETTLEMENT_ACCOUNT
      - flowType: TREASURY_PREFUND_COMPLETED
        slotName: destination
        accountRole: PLATFORM_FLOAT_MTN
      - flowType: TREASURY_SWEEP_COMPLETED
        slotName: source
        accountRole: PLATFORM_FLOAT_MTN
      - flowType: TREASURY_SWEEP_COMPLETED
        slotName: destination
        accountRole: SETTLEMENT_ACCOUNT
